<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>YOUNID Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 Header -->
<header class="header">
  <div class="logo">YOUNID</div>
  <input class="search" placeholder="搜尋商品..." />
  <div class="user">👤</div>
</header>

<!-- 🟡 Hero -->
<section class="hero">
  <div class="hero-left"></div>
  <div class="hero-right">
    <div class="small"></div>
    <div class="small"></div>
  </div>
</section>

<!-- 🛍 商品區 -->
<section class="products">
  <h2>最新上架</h2>
  <div class="grid">

    <div class="card">
      <img src="https://picsum.photos/200" />
      <p>商品名稱</p>
      <span class="hot">HOT</span>
    </div>

    <div class="card">
      <img src="https://picsum.photos/201" />
      <p>商品名稱</p>
    </div>

    <div class="card">
      <img src="https://picsum.photos/202" />
      <p>商品名稱</p>
    </div>

  </div>
</section>

<!-- 🎯 CTA區 -->
<section class="cta">
  <div class="cta-card">全台最多電商使用</div>
  <div class="cta-card">商品開發更簡單</div>
  <div class="cta-card">經營工具最齊全</div>
</section>

<!-- 🔻 Footer -->
<footer class="footer">
  <p>© YOUNID</p>
</footer>

</body>
</html>
